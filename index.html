<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>푸디 공식 커뮤니티 허브</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #fbab7e 0%, #f7ce68 100%); }
        .card-hover { transition: transform 0.3s ease, box-shadow 0.3s ease; }
        .card-hover:hover { transform: translateY(-5px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05); }
        .loader {
            border: 5px solid #f3f3f3;
            border-top: 5px solid #f59e0b;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .disabled-card { opacity: 0.6; pointer-events: none; }
        .tab-btn { transition: all 0.3s ease; }
        .tab-btn.active { color: white; background-color: #34495e; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .star-rating .fa-star { color: #d1d5db; cursor: pointer; transition: color 0.2s; }
        .star-rating:hover .fa-star { color: #facc15; }
        .star-rating .fa-star:hover ~ .fa-star { color: #d1d5db; }
        .star-rating [data-rating].rated .fa-star,
        .star-rating [data-rating] .fa-star.selected { color: #facc15; }
    </style>
</head>
<body class="bg-gray-100 flex flex-col min-h-screen">

    <div id="loading-screen" class="fixed inset-0 bg-white flex flex-col justify-center items-center z-50">
        <div class="loader"></div>
        <p class="mt-4 text-gray-600">푸디 허브에 오신 것을 환영합니다...</p>
    </div>

    <div class="container mx-auto p-4 md:p-8 flex-grow">
        <header class="text-center mb-10">
            <h1 class="text-4xl md:text-5xl font-bold text-gray-800">🍤 푸디 공식 커뮤니티 허브 🍜</h1>
            <p class="text-gray-600 mt-2">우리의 모든 맛있는 순간을 이곳에</p>
        </header>

        <main id="app" class="space-y-12 hidden">
            <!-- 로그인 섹션 -->
            <div id="login-section" class="bg-white p-8 rounded-2xl shadow-lg max-w-md mx-auto">
                <h2 class="text-2xl font-bold mb-6 text-center text-gray-700">푸디 회원 인증</h2>
                <div class="space-y-4">
                    <input type="text" id="studentId" placeholder="학번" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-400">
                    <input type="text" id="studentName" placeholder="이름" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-400">
                    <button onclick="login()" class="w-full gradient-bg text-white font-bold py-3 px-4 rounded-lg hover:opacity-90 transition-opacity">
                        <i class="fas fa-arrow-right mr-2"></i>푸디 허브 입장하기
                    </button>
                </div>
            </div>

            <!-- 메인 컨텐츠 섹션 -->
            <div id="main-content" class="hidden">
                <div class="text-right mb-6">
                    <p class="text-gray-700"><span id="userNameDisplay" class="font-bold"></span>님, 환영합니다!</p>
                    <button onclick="logout()" class="text-sm text-gray-500 hover:text-red-500">로그아웃</button>
                </div>

                <!-- 탭 네비게이션 -->
                <div class="mb-8 bg-gray-200 rounded-lg p-2 flex flex-wrap justify-center space-x-2">
                    <button onclick="showTab('reservation')" class="tab-btn flex-1 py-2 px-4 rounded-md font-semibold text-gray-600 active"><i class="fas fa-calendar-check mr-2"></i>현재 미식회</button>
                    <button onclick="showTab('history')" class="tab-btn flex-1 py-2 px-4 rounded-md font-semibold text-gray-600"><i class="fas fa-trophy mr-2"></i>맛집 명예의 전당</button>
                    <button onclick="showTab('suggestions')" class="tab-btn flex-1 py-2 px-4 rounded-md font-semibold text-gray-600"><i class="fas fa-lightbulb mr-2"></i>익명 건의함</button>
                    <button id="dashboard-tab-btn" onclick="showTab('dashboard')" class="tab-btn flex-1 py-2 px-4 rounded-md font-semibold text-gray-600 hidden"><i class="fas fa-chart-line mr-2"></i>관리자 대시보드</button>
                </div>

                <!-- 탭 컨텐츠 -->
                <div id="tab-content-container">
                    <div id="reservation-tab" class="tab-content active"></div>
                    <div id="history-tab" class="tab-content"></div>
                    <div id="suggestions-tab" class="tab-content"></div>
                    <div id="dashboard-tab" class="tab-content"></div>
                </div>
            </div>
        </main>
    </div>

    <footer class="text-center py-4 text-gray-500 text-sm">
        웹 개발자: 소프트웨어 공학과 이대현
    </footer>

    <div id="alert-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex justify-center items-center px-4 z-50">
        <div class="bg-white p-8 rounded-2xl shadow-xl text-center max-w-sm w-full">
            <div id="modal-icon" class="text-5xl mb-4"></div>
            <p id="alert-message" class="text-lg font-medium text-gray-700"></p>
            <button onclick="closeModal()" class="mt-6 bg-gray-800 text-white font-bold py-2 px-6 rounded-lg hover:bg-gray-700">확인</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, runTransaction, collection, addDoc, query, orderBy, serverTimestamp, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyDdrnlSQZa-GD006G9fvgYDL0V_ib3_pcE",
          authDomain: "foodie-club-694ba.firebaseapp.com",
          projectId: "foodie-club-694ba",
          storageBucket: "foodie-club-694ba.firebasestorage.app",
          messagingSenderId: "563737208880",
          appId: "1:563737208880:web:d82b4ea6dd06754eb7e5f5",
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let currentUser = null;
        const ADMIN_ID = "20201234";

        async function main() {
            try {
                await signInAnonymously(auth);
                setupListeners();
            } catch (error) {
                console.error("Firebase Auth Error:", error);
                showAlert('😥', '인증에 실패했습니다. 새로고침 해주세요.');
            }
        }
        
        function setupListeners() {
            currentUser = JSON.parse(localStorage.getItem('foodieUser'));
            const isAdmin = currentUser && currentUser.studentId === ADMIN_ID;

            onSnapshot(doc(db, "events", "current"), (docSnap) => handleCurrentEvent(docSnap), (error) => console.error("Current event listener error:", error));
            onSnapshot(query(collection(db, "history"), orderBy("archivedAt", "desc")), (snapshot) => handleHistory(snapshot), (error) => console.error("History listener error:", error));
            
            if (isAdmin) {
                onSnapshot(query(collection(db, "suggestions"), orderBy("timestamp", "desc")), (snapshot) => handleSuggestions(snapshot), (error) => console.error("Suggestions listener error:", error));
            } else {
                 handleSuggestions({ docs: [] }); 
            }
        }
        
        let currentEventData = {}, historyData = [], suggestionsData = [];

        function handleCurrentEvent(docSnap){
            currentEventData = docSnap.exists() ? docSnap.data() : { title: "" };
            document.getElementById('loading-screen').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            renderAll();
        }
        function handleHistory(snapshot){
            historyData = snapshot.docs.map(doc => ({id: doc.id, ...doc.data()}));
            renderAll();
        }
        function handleSuggestions(snapshot){
            suggestionsData = snapshot.docs.map(doc => ({id: doc.id, ...doc.data()}));
            renderAll();
        }

        function renderAll() {
            currentUser = JSON.parse(localStorage.getItem('foodieUser'));
            const isAdmin = currentUser && currentUser.studentId === ADMIN_ID;

            if(currentUser) {
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');
                document.getElementById('userNameDisplay').textContent = currentUser.name;
                document.getElementById('dashboard-tab-btn').classList.toggle('hidden', !isAdmin);
            } else {
                document.getElementById('login-section').classList.remove('hidden');
                document.getElementById('main-content').classList.add('hidden');
            }
            
            renderReservationTab(isAdmin);
            renderHistoryTab();
            renderSuggestionsTab(isAdmin);
            if (isAdmin) renderDashboardTab();
        }
        
        function renderReservationTab(isAdmin) {
            const container = document.getElementById('reservation-tab');
            const { title, datetime, limit, restaurants = [] } = currentEventData;
            
            let adminPanelHTML = '';
             if(isAdmin){
                adminPanelHTML = `
                <div class="bg-yellow-100 border-l-4 border-yellow-500 p-6 rounded-lg mb-8">
                    <h3 class="text-xl font-bold text-yellow-800 mb-4"><i class="fas fa-crown mr-2"></i>회장님 관리자 패널</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                        <input type="text" id="event-title" value="${title || ''}" placeholder="미식회 이름" class="w-full px-4 py-2 border rounded-lg">
                        <input type="datetime-local" id="event-datetime" value="${datetime || ''}" class="w-full px-4 py-2 border rounded-lg">
                        <input type="number" id="event-limit" value="${limit || ''}" placeholder="식당별 참여 인원" class="w-full px-4 py-2 border rounded-lg md:col-span-2">
                    </div>
                    <h4 class="font-bold text-yellow-700 mb-2">선택 가능한 식당 목록</h4>
                    <div id="restaurants-container" class="space-y-3 mb-4">${(restaurants.length > 0 ? restaurants.map(r => restaurantFieldHTML(r.name, r.info)).join('') : restaurantFieldHTML())}</div>
                    <button type="button" onclick="addRestaurantField()" class="mb-4 text-sm bg-gray-200 hover:bg-gray-300 text-gray-700 font-semibold py-2 px-4 rounded-lg"><i class="fas fa-plus mr-2"></i>식당 추가</button>
                    <div class="flex space-x-2">
                        <button onclick="updateCurrentEvent()" class="flex-1 bg-yellow-500 text-white font-bold py-2 px-4 rounded-lg hover:bg-yellow-600"><i class="fas fa-check-circle mr-2"></i>생성/업데이트</button>
                        ${title ? `<button onclick="archiveCurrentEvent()" class="flex-1 bg-blue-500 text-white font-bold py-2 px-4 rounded-lg hover:bg-blue-600"><i class="fas fa-archive mr-2"></i>활동 종료</button>` : ''}
                    </div>
                </div>`;
             }

            let eventContainerHTML = '';
            if(!title){
                eventContainerHTML = `<div class="text-center py-12"><i class="fas fa-utensils-slash text-5xl text-gray-300"></i><p class="mt-4 text-gray-500">현재 진행중인 미식회가 없습니다.</p></div>`;
            } else {
                 let userReservationRestaurantId = null;
                if (currentUser) {
                    restaurants.forEach(r => {
                        if ((r.reservations || []).some(p => p.studentId === currentUser.studentId) || (r.waiting || []).some(p => p.studentId === currentUser.studentId)) {
                            userReservationRestaurantId = r.id;
                        }
                    });
                }
                const restaurantCardsHTML = restaurants.map(r => restaurantCardHTML(r, limit, userReservationRestaurantId)).join('');
                eventContainerHTML = `
                <div class="bg-white p-8 rounded-2xl shadow-lg">
                    <h2 class="text-3xl font-bold mb-2 text-center text-gray-800">${title}</h2>
                    <p class="text-center text-gray-500 mb-6">🗓️ ${datetime ? new Date(datetime).toLocaleString('ko-KR') : '날짜 미정'}</p>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">${restaurantCardsHTML}</div>
                </div>`;
            }
            container.innerHTML = adminPanelHTML + eventContainerHTML;
        }

        function restaurantCardHTML(r, limit, userReservationRestaurantId) {
            const isReservedByUser = r.id === userReservationRestaurantId;
            const isDisabled = userReservationRestaurantId !== null && !isReservedByUser;
            const reservations = r.reservations || [];
            const waiting = r.waiting || [];
            const reservedCount = reservations.length;
            const percentage = limit > 0 ? (reservedCount / limit) * 100 : 0;
            
            const participantListHTML = reservations.length > 0 ? reservations.map(p => `<li class="text-sm text-gray-600">${p.studentId} ${p.name}</li>`).join('') : '<li class="text-sm text-gray-400">예약자 없음</li>';
            const waitingListHTML = waiting.length > 0 ? `<h5 class="font-semibold mt-2 text-orange-600">대기 명단</h5><ul>${waiting.map((p, i) => `<li class="text-sm text-gray-600">${p.studentId} ${p.name} (대기 ${i+1})</li>`).join('')}</ul>` : '';

            let buttonHTML;
            if (isReservedByUser) {
                buttonHTML = `<button onclick="cancelReservation('${r.id}')" class="w-full mt-4 bg-gray-500 text-white font-bold py-2 px-4 rounded-lg hover:bg-gray-600"><i class="fas fa-times mr-2"></i>예약 취소</button>`;
            } else if (reservedCount >= limit) {
                buttonHTML = `<button onclick="makeReservation('${r.id}')" class="w-full mt-4 bg-orange-500 text-white font-bold py-2 px-4 rounded-lg hover:bg-orange-600"><i class="fas fa-hourglass-start mr-2"></i>대기 신청</button>`;
            } else {
                buttonHTML = `<button onclick="makeReservation('${r.id}')" class="w-full mt-4 bg-green-500 text-white font-bold py-2 px-4 rounded-lg hover:bg-green-600"><i class="fas fa-utensils mr-2"></i>예약하기</button>`;
            }

            return `
            <div class="bg-white p-6 rounded-xl shadow-md card-hover flex flex-col ${isDisabled ? 'disabled-card' : ''}">
                <div class="flex-grow">
                    <h3 class="text-xl font-bold text-gray-800">${r.name}</h3>
                    <p class="text-gray-500 mb-4">${r.info}</p>
                    <div class="w-full bg-gray-200 rounded-full h-5 mb-2">
                        <div class="bg-green-500 h-5 text-xs font-medium text-white text-center p-0.5 leading-none rounded-full" style="width: ${percentage}%">${Math.round(percentage)}%</div>
                    </div>
                    <p class="text-right text-sm font-semibold text-gray-600">${reservedCount} / ${limit} 명</p>
                    <div class="mt-4">
                        <h4 class="font-semibold text-blue-800">예약 확정자</h4>
                        <ul class="mt-1">${participantListHTML}</ul>
                        ${waitingListHTML}
                    </div>
                </div>
                <div class="mt-auto">${buttonHTML}</div>
            </div>`;
        }
        
        function renderHistoryTab(){
            const container = document.getElementById('history-tab');
            if (historyData.length === 0) {
                container.innerHTML = `<div class="text-center py-12"><i class="fas fa-trophy text-5xl text-gray-300"></i><p class="mt-4 text-gray-500">아직 '명예의 전당'에 오른 맛집이 없습니다.</p></div>`;
                return;
            }
            container.innerHTML = historyData.map(event => {
                const restaurantsHTML = (event.restaurants || []).map(r => historyRestaurantCardHTML(r, event.id)).join('');
                return `
                <div class="mb-8">
                    <h3 class="text-2xl font-bold text-gray-700 border-b pb-2 mb-4">${event.title} <span class="text-base font-normal text-gray-500">- ${new Date(event.datetime).toLocaleDateString('ko-KR')}</span></h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">${restaurantsHTML}</div>
                </div>`;
            }).join('');
        }
        
        function historyRestaurantCardHTML(r, eventId) {
            const reviews = r.reviews || [];
            const averageRating = reviews.length > 0 ? reviews.reduce((acc, cur) => acc + cur.rating, 0) / reviews.length : 0;
            const starsHTML = Array.from({length: 5}, (_, i) => `<i class="fa-solid fa-star ${i < Math.round(averageRating) ? 'text-amber-400' : 'text-gray-300'}"></i>`).join('');
            const reviewsHTML = reviews.map(review => `<div class="bg-gray-100 p-2 rounded text-sm mt-1"><b>${review.name}:</b> ${review.comment}</div>`).join('');
            const hasUserReviewed = currentUser && reviews.some(review => review.studentId === currentUser.studentId);
            const reviewFormHTML = currentUser && !hasUserReviewed ? `
            <div class="mt-4">
                <div class="star-rating flex justify-center text-2xl" onmouseleave="resetStars(this)">
                    ${Array.from({length: 5}, (_, i) => `<i class="fa-solid fa-star" data-value="${i+1}" onmouseover="highlightStars(this, ${i+1})" onclick="rateRestaurant('${eventId}', '${r.id}', ${i+1})"></i>`).join('')}
                </div>
                <div class="flex mt-2">
                    <input type="text" id="review-comment-${eventId}-${r.id}" class="flex-grow text-sm border rounded-l-md p-1" placeholder="한줄평 남기기...">
                    <button onclick="submitReview('${eventId}', '${r.id}')" class="bg-gray-600 text-white px-3 rounded-r-md text-sm">등록</button>
                </div>
            </div>` : hasUserReviewed ? `<div class="mt-3 text-sm text-green-600 font-semibold"><i class="fas fa-check-circle"></i> 리뷰 등록 완료!</div>` : '';

            return `
            <div class="bg-white p-4 rounded-lg">
                <h4 class="text-lg font-bold">${r.name}</h4>
                <p class="text-sm text-gray-500">${r.info}</p>
                <div class="my-2">${starsHTML} <span class="text-sm text-gray-500">(${averageRating.toFixed(1)} / 5.0)</span></div>
                <div class="text-xs text-gray-400">리뷰 ${reviews.length}개</div>
                ${reviewsHTML}
                ${reviewFormHTML}
            </div>`;
        }

        function renderSuggestionsTab(isAdmin){
            const container = document.getElementById('suggestions-tab');
            let suggestionsListHTML = '';
            if (isAdmin) {
                suggestionsListHTML = suggestionsData.length > 0 ? suggestionsData.map(s => `
                <div class="bg-white p-4 rounded-lg shadow-sm flex justify-between items-center">
                    <div>
                        <p class="text-gray-700">${s.text}</p>
                        <p class="text-right text-xs text-gray-400 mt-2">${s.timestamp ? new Date(s.timestamp.toDate()).toLocaleString('ko-KR') : ''}</p>
                    </div>
                    <button onclick="deleteSuggestion('${s.id}')" class="text-red-500 hover:text-red-700 ml-4 p-2"><i class="fas fa-trash-alt"></i></button>
                </div>`).join('') : '<p class="text-center text-gray-400">아직 등록된 건의사항이 없습니다.</p>';
            }

            container.innerHTML = `
            <div class="bg-white p-6 rounded-xl shadow-lg">
                <h3 class="text-2xl font-bold mb-4 text-gray-700">익명 건의함</h3>
                <p class="text-gray-500 mb-4">다음 미식회나 동아리 활동 아이디어를 남겨주세요. 회장에게만 비공개로 전달됩니다.</p>
                <div class="flex">
                    <input type="text" id="suggestion-input" class="w-full px-4 py-2 border rounded-l-lg" placeholder="여기에 건의사항을 입력하세요...">
                    <button onclick="submitSuggestion()" class="bg-gray-800 text-white font-semibold px-6 rounded-r-lg hover:bg-gray-700">제출</button>
                </div>
                ${isAdmin ? `<div class="mt-8 space-y-4">${suggestionsListHTML}</div>` : ''}
            </div>`;
        }

        function renderDashboardTab(){
            const container = document.getElementById('dashboard-tab');
            let totalParticipants = 0, totalCapacity = 0;
            historyData.forEach(event => {
                totalParticipants += (event.restaurants || []).reduce((sum, r) => sum + (r.reservations || []).length, 0);
                totalCapacity += (event.restaurants || []).length * (event.limit || 0);
            });
            const overallParticipationRate = totalCapacity > 0 ? (totalParticipants / totalCapacity * 100).toFixed(1) : 0;
            container.innerHTML = `
            <div class="bg-white p-6 rounded-xl shadow-lg">
                <h3 class="text-2xl font-bold mb-6 text-gray-700">푸디 활동 현황</h3>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 text-center">
                    <div class="bg-blue-100 p-4 rounded-lg"><p class="text-3xl font-bold text-blue-800">${historyData.length}</p><p class="text-blue-600">총 미식회 횟수</p></div>
                    <div class="bg-green-100 p-4 rounded-lg"><p class="text-3xl font-bold text-green-800">${totalParticipants}</p><p class="text-green-600">누적 참여 인원</p></div>
                    <div class="bg-amber-100 p-4 rounded-lg"><p class="text-3xl font-bold text-amber-800">${overallParticipationRate}%</p><p class="text-amber-600">전체 참여율</p></div>
                </div>
                <div class="mt-8"><h4 class="text-xl font-bold mb-4 text-gray-600">과거 활동 기록</h4><ul class="space-y-2">${historyData.map(e => `<li class="bg-gray-50 p-3 rounded">${new Date(e.datetime).toLocaleDateString('ko-KR')} - <strong>${e.title}</strong> (${(e.restaurants || []).reduce((sum, r) => sum + (r.reservations || []).length, 0)}명 참여)</li>`).join('')}</ul></div>
            </div>`;
        }

        window.login = () => { /* ... */ };
        window.logout = () => { /* ... */ };
        window.showTab = (tabName) => { /* ... */ };
        window.restaurantFieldHTML = (n='', i='') => `<div class="flex items-center space-x-2 restaurant-entry"><input type="text" value="${n}" placeholder="식당 이름" class="flex-grow px-4 py-2 border rounded-lg restaurant-name"><input type="text" value="${i}" placeholder="식당 정보" class="flex-grow px-4 py-2 border rounded-lg restaurant-info"><button type="button" onclick="this.parentElement.remove()" class="bg-red-500 text-white p-2 rounded-full hover:bg-red-600 w-10 h-10 flex-shrink-0"><i class="fas fa-trash"></i></button></div>`;
        window.addRestaurantField = () => document.getElementById('restaurants-container').insertAdjacentHTML('beforeend', restaurantFieldHTML());
        
        // [NEW] Delete Suggestion Function
        window.deleteSuggestion = async function(suggestionId) {
            if (!confirm('정말로 이 건의사항을 삭제하시겠습니까?')) return;
            try {
                await deleteDoc(doc(db, "suggestions", suggestionId));
                showAlert('🗑️', '건의사항이 성공적으로 삭제되었습니다.');
            } catch (e) {
                console.error("Failed to delete suggestion: ", e);
                showAlert('😥', '삭제에 실패했습니다.');
            }
        }
        
        // Full function definitions
        window.login = () => { const sId = document.getElementById('studentId').value.trim(); const sName = document.getElementById('studentName').value.trim(); if (!sId || !sName) return showAlert('😥', '학번과 이름을 모두 입력해주세요.'); localStorage.setItem('foodieUser', JSON.stringify({ studentId: sId, name: sName })); location.reload(); };
        window.logout = () => { localStorage.removeItem('foodieUser'); location.reload(); };
        window.showTab = (t) => { document.querySelectorAll('.tab-content, .tab-btn').forEach(e => e.classList.remove('active')); document.getElementById(`${t}-tab`).classList.add('active'); document.querySelector(`button[onclick="showTab('${t}')"]`).classList.add('active'); };
        window.updateCurrentEvent = async function() { const t=document.getElementById('event-title').value.trim(),d=document.getElementById('event-datetime').value,l=parseInt(document.getElementById('event-limit').value,10),rI=Array.from(document.querySelectorAll('.restaurant-entry')).map(e=>({name:e.querySelector('.restaurant-name').value.trim(),info:e.querySelector('.restaurant-info').value.trim()})).filter(r=>r.name);if(!t||!d||!l||rI.length===0)return showAlert('😥','모든 필드를 채워주세요.');try{await runTransaction(db,async e=>{const n=doc(db,"events","current"),o=await e.get(n),a=o.exists()?o.data().restaurants||[]:[],s=rI.map(t=>{const n=a.find(e=>e.name===t.name);return n?{...n,info:t.info}:{id:`res_${Date.now()}_${Math.random().toString(36).substr(2,9)}`,...t,reservations:[],waiting:[],reviews:[]}});e.set(n,{title:t,datetime:d,limit:l,restaurants:s})}),showAlert('🎉','미식회 정보가 업데이트되었습니다!')}catch(e){console.error("Update failed: ",e),showAlert('😥','업데이트에 실패했습니다.')}};
        window.archiveCurrentEvent = async function(){if(!confirm('현재 미식회를 종료하고 보관하시겠습니까?'))return;const e={...currentEventData,archivedAt:serverTimestamp()};try{await addDoc(collection(db,"history"),e),await runTransaction(db,async e=>e.set(doc(db,"events","current"),{title:""})),showAlert('📁','활동이 보관되었습니다.')}catch(e){console.error("Archive failed: ",e),showAlert('😥','활동 보관에 실패했습니다.')}};
        window.submitSuggestion = async function(){const e=document.getElementById('suggestion-input'),t=e.value.trim();if(!t)return;if(!currentUser)return showAlert('😥','로그인 후 이용해주세요.');try{await addDoc(collection(db,"suggestions"),{text:t,timestamp:serverTimestamp(),author:{name:currentUser.name,studentId:currentUser.studentId}}),e.value="",showAlert('💡','소중한 의견 감사합니다!')}catch(e){console.error("Suggestion submission failed: ",e),showAlert('😥','제출에 실패했습니다.')}};
        let selectedRating=0;window.highlightStars=(e,t)=>e.parentElement.querySelectorAll('.fa-star').forEach(e=>e.classList.toggle('selected',e.dataset.value<=t));window.resetStars=e=>e.querySelectorAll('.fa-star').forEach(e=>e.classList.remove('selected'));window.rateRestaurant=(e,t,n)=>{selectedRating=n;const o=document.querySelector(`#review-comment-${e}-${t}`).parentElement.previousElementSibling;o.dataset.rating=n,o.classList.add('rated'),highlightStars(o.querySelector('.fa-star'),n)};
        window.submitReview = async function(e,t){if(!currentUser)return showAlert('😥','리뷰를 작성하려면 로그인이 필요합니다.');const n=document.getElementById(`review-comment-${e}-${t}`).value.trim();if(selectedRating===0)return showAlert('🤔','별점을 먼저 선택해주세요!');if(!n)return showAlert('🤔','한줄평을 입력해주세요!');try{const o=doc(db,"history",e);await runTransaction(db,async a=>{const s=await a.get(o);if(!s.exists())throw new Error("Past event not found");const i=s.data(),r=(i.restaurants||[]).findIndex(e=>e.id===t);if(r===-1)throw new Error("Restaurant not found");const d=i.restaurants[r];d.reviews||(d.reviews=[]),d.reviews.some(e=>e.studentId===currentUser.studentId)?showAlert('🤔','이미 리뷰를 작성하셨습니다.'):d.reviews.push({...currentUser,rating:selectedRating,comment:n}),a.update(o,{restaurants:i.restaurants})}),selectedRating=0,showAlert('⭐','리뷰가 등록되었습니다!')}catch(e){console.error("Review failed: ",e),showAlert('😥','리뷰 등록에 실패했습니다.')}};
        window.makeReservation = async function(e){if(!currentUser)return showAlert('😥','참가자 정보를 먼저 입력해주세요.');try{await runTransaction(db,async t=>{const n=doc(db,"events","current"),o=await t.get(n);if(!o.exists())throw new Error("Event does not exist!");let a=o.data();if(a.restaurants||(a.restaurants=[]),a.restaurants.some(e=>(e.reservations||[]).some(e=>e.studentId===currentUser.studentId)||(e.waiting||[]).some(e=>e.studentId===currentUser.studentId)))return void showAlert('🤔','이미 다른 식당에 예약하셨습니다.');const s=a.restaurants.findIndex(t=>t.id===e);if(s===-1)throw new Error("Restaurant not found!");const i={...currentUser,timestamp:(new Date).toISOString()},r=a.restaurants[s];r.reservations||(r.reservations=[]),r.waiting||(r.waiting=[]),r.reservations.length<a.limit?(r.reservations.push(i),showAlert('✅',`${r.name}에 예약이 확정되었습니다!`)):(r.waiting.push(i),showAlert('✋',`${r.name} 예약이 마감되어 대기 명단에 등록되었습니다.`)),t.update(n,{restaurants:a.restaurants})})}catch(e){showAlert('😥',`예약 처리 중 오류: ${e.message}`)} };
        window.cancelReservation = async function(e){if(!currentUser)return;try{await runTransaction(db,async t=>{const n=doc(db,"events","current"),o=await t.get(n);if(!o.exists())throw new Error("Event does not exist!");let a=o.data();a.restaurants||(a.restaurants=[]);const s=a.restaurants.findIndex(t=>t.id===e);if(s===-1)throw new Error("Restaurant not found!");const i=a.restaurants[s];i.reservations||(i.reservations=[]),i.waiting||(i.waiting=[]);const r=i.reservations.length;i.reservations=i.reservations.filter(e=>e.studentId!==currentUser.studentId),i.reservations.length<r?i.waiting.length>0&&i.reservations.push(i.waiting.shift()):i.waiting=i.waiting.filter(e=>e.studentId!==currentUser.studentId),t.update(n,{restaurants:a.restaurants}),showAlert('🗑️',`${i.name} 예약이 취소되었습니다.`)})}catch(e){showAlert('😥','예약 취소 중 오류가 발생했습니다.')}};

        window.showAlert = (i, m) => { document.getElementById('modal-icon').innerHTML=i; document.getElementById('alert-message').textContent=m; document.getElementById('alert-modal').classList.remove('hidden'); };
        window.closeModal = () => document.getElementById('alert-modal').classList.add('hidden');
        
        main();
    </script>
